<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Wishlist</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div class="app-container">
    <h1>Wishlist</h1>

    <div class="tabs">
        <button class="tab-btn active" data-user="Аллочки">Аллочка</button>
        <button class="tab-btn" data-user="Дашки">Дашка</button>
        <button class="tab-btn" data-user="Іри">Іра</button>
    </div>

    <div class="user-actions">
        <button id="addItemBtn" class="main-btn"><i class="fas fa-plus"></i> Додати річ</button>
    </div>

    <form id="itemForm" class="hidden">
        <h3>Нове бажання</h3>
        <div class="form-group">
            <label class="file-label">
                <i class="fas fa-image"></i> Вибрати фото
                <input type="file" id="itemImageFile" accept="image/*" required>
            </label>
        </div>
        <div class="form-group">
            <input type="text" id="itemComment" placeholder="Твій коментар (необов'язково)">
        </div>
        <div class="form-buttons">
            <button type="submit" class="save-btn">Зберегти</button>
            <button type="button" id="cancelBtn" class="cancel-btn">Скасувати</button>
        </div>
    </form>

    <div id="itemList" class="wish-grid"></div>
</div>

<div id="itemModal" class="modal hidden">
    <span class="close-modal">&times;</span>
    <div class="modal-content">
        <div id="modalDetails"></div>
    </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
