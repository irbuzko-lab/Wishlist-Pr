<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="app">
    <h1>Wishlist</h1>

    <div class="tabs">
        <button class="tab active" data-user="Іринка">Аллочка</button>
        <button class="tab" data-user="Подруга1">Дашка</button>
        <button class="tab" data-user="Подруга2">Іра</button>
    </div>

    <div class="actions">
        <button id="addBtn">Додати</button>
        <button id="viewBtn">Список</button>
    </div>

    <form id="form" class="hidden">
        <input type="file" id="file" accept="image/*" required>
        <input type="text" id="comment" placeholder="Коментар (необов'язково)">
        <button type="submit">Зберегти</button>
    </form>

    <div id="list" class="hidden"></div>
</div>

<div id="modal" class="modal">
    <div class="modal-box">
        <span id="close">×</span>
        <div id="modalContent"></div>
    </div>
</div>

<script type="module" src="./script.js"></script>
</body>
</html>
